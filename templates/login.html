<!DOCTYPE html>
<html style="background:#121212; color:white; font-family:sans-serif;">
<body style="display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    <div style="width:300px; text-align:center; background:#1e1e1e; padding:30px; border-radius:10px;">
        <h2>Вхід</h2>
        <form method="POST">
            <input name="username" placeholder="Логін" required style="width:90%; margin-bottom:15px; padding:10px; background:#333; color:white; border:none;"><br>
            <input name="password" type="password" placeholder="Пароль" required style="width:90%; margin-bottom:15px; padding:10px; background:#333; color:white; border:none;"><br>
            <button type="submit" style="width:97%; padding:10px; background:#0084ff; color:white; border:none; border-radius:5px;">Увійти</button>
        </form>
        <p style="font-size:14px;">Немає аккаунту? <a href="/register" style="color:#00d4ff;">Реєстрація</a></p>
    </div>
</body>
</html>
