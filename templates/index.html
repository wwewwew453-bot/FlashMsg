<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>FlashMsg | Швидкий месенджер</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/302/302353.png" type="image/png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #0e1621; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0e1621; display:flex; justify-content:center; align-items:center; z-index:100; }
        .login-box { background:#17212b; padding:40px; border-radius:20px; text-align:center; width: 300px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .login-box input { display:block; width:100%; margin:15px 0; padding:12px; border-radius:8px; border:none; background:#242f3d; color:white; box-sizing: border-box; }
        .login-box button { width: 100%; background:#40a7e3; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold; }
        #main-container { display:none; width:100%; height: 100%; flex-direction:row; }
        .sidebar { width: 300px; background: #17212b; border-right: 1px solid #0e1621; display: flex; flex-direction: column; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #0e1621; }
        .header { background: #17212b; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #000; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg-row { display: flex; gap: 10px; max-width: 80%; margin: 4px 0; }
        .mine { align-self: flex-end; flex-direction: row-reverse; }
        .other { align-self: flex-start; }
        .bubble { padding: 8px 12px; border-radius: 12px; background: #182533; font-size: 15px; position: relative; }
        .mine .bubble { background: #2b5278; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .input-area { background: #17212b; padding: 15px; display: flex; gap: 12px; align-items: center; }
        .input-area input { flex:1; background:transparent; border:none; color:white; outline:none; font-size: 16px; }
        .btn { cursor: pointer; color: #40a7e3; font-weight: bold; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <h2>FLASH<span style="color:#ffcc00">MSG</span></h2>
            <input type="text" id="user" placeholder="Логін">
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="login()">УВІЙТИ ⚡</button>
            <p id="err" style="color:#e53935; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>
    <div id="main-container">
        <div class="sidebar"><div style="padding:20px;"><b>FLASH MSG</b></div></div>
        <div class="main-chat">
            <div class="header"><h3 id="chat-title">Загальний чат</h3></div>
            <div id="chat"></div>
            <div class="input-area">
                <label class="btn">📎<input type="file" id="f-in" style="display:none" onchange="upImg()"></label>
                <input type="text" id="m" placeholder="Повідомлення..." onkeypress="if(event.keyCode==13) send()">
                <div class="btn" onclick="send()">➤</div>
            </div>
        </div>
    </div>
    <script>
        var socket = io({ transports: ['websocket', 'polling'] });
        var myName = "";
        function login() {
            var u = document.getElementById('user').value;
            var p = document.getElementById('pass').value;
            if(u && p) socket.emit('login_or_register', {username: u, password: p});
        }
        socket.on('login_success', function(data) {
            myName = data.username;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-container').style.display = 'flex';
        });
        socket.on('login_error', function(data) { document.getElementById('err').innerText = data.msg; });
        function send() {
            var m = document.getElementById('m');
            if(m.value.trim()) { socket.emit('send_message', {username: myName, message: m.value}); m.value = ''; }
        }
        function upImg() {
            var file = document.getElementById('f-in').files[0];
            var reader = new FileReader();
            reader.onloadend = function() { socket.emit('send_image', {username: myName, image: reader.result}); }
            if(file) reader.readAsDataURL(file);
        }
        socket.on('receive_message', function(data) {
            var c = document.getElementById('chat');
            var isM = data.username === myName;
            var content = data.image ? `<img src="${data.image}" style="max-width:200px; border-radius:10px;">` : data.message;
            c.innerHTML += `<div class="msg-row ${isM ? 'mine' : 'other'}">
                <div class="avatar" style="background:#40a7e3">${data.username[0].toUpperCase()}</div>
                <div class="bubble"><b>${data.username}</b><br>${content}<br><small style="font-size:9px; opacity:0.6">${data.time}</small></div>
            </div>`;
            c.scrollTop = c.scrollHeight;
        });
    </script>
</body>
</html>
