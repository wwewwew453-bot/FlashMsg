<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashMsg | Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root {
            --bg-dark: #0e1621;
            --bg-panel: #17212b;
            --accent: #40a7e3;
            --accent-hover: #338fbf;
            --text-main: #ffffff;
            --text-dim: #7f91a4;
            --msg-mine: #2b5278;
            --msg-other: #182533;
        }

        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Вхід */
        #login-overlay { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 100; transition: 0.5s; }
        .login-box { background: var(--bg-panel); padding: 40px; border-radius: 24px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box h2 { font-size: 28px; margin-bottom: 20px; letter-spacing: 1px; }
        .login-box input { display: block; width: 100%; margin: 12px 0; padding: 14px; border-radius: 12px; border: 1px solid #242f3d; background: #242f3d; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        .login-box input:focus { border-color: var(--accent); }
        .login-box button { width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .login-box button:hover { background: var(--accent-hover); transform: translateY(-2px); }

        /* Основний інтерфейс */
        #main-container { display: none; width: 100%; height: 100%; }
        
        /* Сайдбар */
        .sidebar { width: 300px; background: var(--bg-panel); border-right: 1px solid #000; display: flex; flex-direction: column; }
        .profile-section { padding: 20px; border-bottom: 1px solid #0e1621; display: flex; align-items: center; gap: 15px; background: #1c2938; }
        .my-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .search-box { padding: 15px; }
        .search-box input { width: 100%; padding: 10px; border-radius: 10px; border: none; background: #242f3d; color: white; outline: none; box-sizing: border-box; font-size: 14px; }

        /* Чат */
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-header { background: var(--bg-panel); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #000; z-index: 10; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-attachment: fixed; }

        /* Повідомлення */
        .msg-row { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .mine { align-self: flex-end; flex-direction: row-reverse; }
        .other { align-self: flex-start; }

        .bubble { padding: 10px 15px; border-radius: 18px; position: relative; font-size: 15px; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .mine .bubble { background: var(--msg-mine); border-bottom-right-radius: 4px; }
